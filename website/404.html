<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden – Enzo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2A1F17;
    color: #FAF5EE;
    font-family: 'DM Sans', system-ui, sans-serif;
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 4rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  h1 em { font-weight: 400; color: #D4845E; }
  p { color: rgba(240,232,219,0.6); margin-bottom: 2rem; font-size: 1.1rem; }
  a {
    display: inline-block;
    padding: 14px 32px;
    background: #B85A3A;
    color: #FAF5EE;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.3s;
  }
  a:hover { background: #D4845E; transform: translateY(-2px); }
</style>
</head>
<body>
  <div>
    <h1>Ops, <em>sbagliato!</em></h1>
    <p>Diese Seite gibt es leider nicht. Aber unsere Pasta schon.</p>
    <a href="/">Zurück zur Startseite</a>
