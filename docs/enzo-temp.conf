# ═══════════════════════════════════════════
# Da Enzo – nginx Config (Ziel: 100/100 Wolf Score)
# ═══════════════════════════════════════════

# WWW → non-WWW Redirect (WWW-Normalisierung)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.da-enzo-muenchen.de;

    ssl_certificate /etc/letsencrypt/live/da-enzo-muenchen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/da-enzo-muenchen.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://da-enzo-muenchen.de$request_uri;
}

# Hauptserver
server {
    server_name da-enzo-muenchen.de 88.99.171.196;
    root /var/www/enzo;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # security.txt (RFC 9116)
    location = /.well-known/security.txt {
        alias /var/www/enzo/.well-known/security.txt;
    }

    # Statische Assets: langer Cache
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # JSON-Dateien: kein Cache
    location ~* \.(json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Admin Basic Auth
    location = /admin.html {
        auth_basic "Da Enzo Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-enzo;
        try_files $uri =404;
    }

    # Sensible Dateien blockieren
    location ~* \.(db|sql|env|bak)$ {
        deny all;
        return 404;
    }

    error_page 404 /404.html;

    location ~ /\. {
        deny all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot

    # ═══════════════════════════════════════════
    # SECURITY HEADERS
    # ═══════════════════════════════════════════

    # HSTS mit preload (20/20)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # X-Frame-Options (15/15)
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options (10/10)
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy (10/10)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy (10/10)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy (25/25)
    # unsafe-inline durch Hashes ersetzen → siehe CSP-Hash-Anleitung
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com https://*.google.com; connect-src 'self' https://maps.googleapis.com; frame-src https://www.google.com https://maps.google.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    # Cross-Origin-Opener-Policy (5/5)
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cross-Origin-Embedder-Policy (5/5)
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Cross-Origin-Resource-Policy
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Cache-Control für HTML (BSI) (8/8)
    add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;

    # Reporting-Endpoints (Security Reporting)
    add_header Reporting-Endpoints "default=\"https://da-enzo-muenchen.de/api/csp-report\"" always;
    add_header NEL "{\"report_to\":\"default\",\"max_age\":31536000}" always;

    # Origin-Agent-Cluster
    add_header Origin-Agent-Cluster "?1" always;

    # ═══════════════════════════════════════════
    # SSL (managed by Certbot)
    # ═══════════════════════════════════════════
    ssl_certificate /etc/letsencrypt/live/da-enzo-muenchen.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/da-enzo-muenchen.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS Redirect
server {
    if ($host = www.da-enzo-muenchen.de) {
        return 301 https://da-enzo-muenchen.de$request_uri;
    } # managed by Certbot

    if ($host = da-enzo-muenchen.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name da-enzo-muenchen.de www.da-enzo-muenchen.de 88.99.171.196;
    return 404; # managed by Certbot
}
