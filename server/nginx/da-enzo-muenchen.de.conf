# da-enzo-muenchen.de – Statische Website
# Certbot ergaenzt die SSL-Config automatisch

server {
    listen 80;
    listen [::]:80;
    server_name da-enzo-muenchen.de www.da-enzo-muenchen.de;

    # Certbot Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://www.da-enzo-muenchen.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name da-enzo-muenchen.de;

    # Redirect non-www → www
    return 301 https://www.da-enzo-muenchen.de$request_uri;

    # SSL wird von Certbot ergaenzt
    ssl_certificate /etc/letsencrypt/live/da-enzo-muenchen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/da-enzo-muenchen.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.da-enzo-muenchen.de;

    root /var/www/enzo;
    index index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/da-enzo-muenchen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/da-enzo-muenchen.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Caching fuer statische Assets
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JSON-Dateien NICHT cachen (Speisekarte + Wochenkarte aendern sich)
    location ~* \.(json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 404-Seite
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Kein Zugriff auf versteckte Dateien
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
