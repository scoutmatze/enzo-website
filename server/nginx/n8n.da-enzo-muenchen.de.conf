# n8n.da-enzo-muenchen.de – n8n Reverse Proxy
# Certbot ergaenzt die SSL-Config automatisch

server {
    listen 80;
    listen [::]:80;
    server_name n8n.da-enzo-muenchen.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://n8n.da-enzo-muenchen.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.da-enzo-muenchen.de;

    # SSL
    ssl_certificate /etc/letsencrypt/live/n8n.da-enzo-muenchen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.da-enzo-muenchen.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Reverse Proxy → n8n Docker Container
    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (n8n braucht das)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts erhoehen (n8n Workflows koennen laenger dauern)
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Groessere Uploads erlauben (fuer Workflow-Imports)
        client_max_body_size 50M;
    }
}
