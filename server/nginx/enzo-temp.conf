server {
    server_name da-enzo-muenchen.de www.da-enzo-muenchen.de 88.99.171.196;
    root /var/www/enzo;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Admin Basic Auth
    location = /admin.html {
        auth_basic "Da Enzo Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-enzo;
        try_files $uri =404;
    }

    # Sensible Dateien blockieren
    location ~* \.(db|sql|env|bak)$ {
        deny all;
        return 404;
    }

    error_page 404 /404.html;

    location ~ /\. {
        deny all;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_certificate /etc/letsencrypt/live/da-enzo-muenchen.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/da-enzo-muenchen.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.da-enzo-muenchen.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = da-enzo-muenchen.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name da-enzo-muenchen.de www.da-enzo-muenchen.de 88.99.171.196;
    return 404; # managed by Certbot
}
