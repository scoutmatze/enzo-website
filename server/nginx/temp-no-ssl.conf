# TEMPORAERE Config – VOR Certbot
# Nutze diese Config bis die Domain auf den Server zeigt
# und Certbot die SSL-Zertifikate erstellt hat.
#
# Nach certbot --nginx ... kann diese Datei geloescht werden.
# Certbot aktualisiert die Haupt-Configs automatisch.

# Website
server {
    listen 80;
    listen [::]:80;
    server_name da-enzo-muenchen.de www.da-enzo-muenchen.de;

    root /var/www/enzo;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    error_page 404 /404.html;

    location ~ /\. {
        deny all;
    }
}

# n8n
server {
    listen 80;
    listen [::]:80;
    server_name n8n.da-enzo-muenchen.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 50M;
    }
}
